<!DOCTYPE html>
<!-- Declares the document type as HTML5 -->

<html lang="en">
<!-- Root element of the HTML page, language set to English -->

<head>
    <meta charset="UTF-8">
    <!-- Sets character encoding to UTF-8 to support special characters -->

    <title>IT Portal - iFrame Practice</title>
    <!-- Title shown on the browser tab -->
</head>

<body>
    <!-- Main visible content of the webpage starts here -->

    <h1>IT Resources Dashboard</h1>
    <!-- Main heading of the page -->

    <h3>Featured Tutorial: HTML Fundamentals</h3>
    <!-- Section heading for the embedded video -->

    <!-- iFrame used to embed a YouTube video -->
    <iframe width="560" height="315"
        src="https://www.youtube.com/embed/29l2gxIS5Iw?si=5k9wbo4aHc0PTYvn"
        title="YouTube video player"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen>
    </iframe>

    <hr>
    <!-- Horizontal line used to separate sections -->

    <h3>Campus Location</h3>
    <!-- Section heading for Google Maps embed -->

    <!-- iFrame used to embed Google Maps -->
    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3861.123456789!2d120.913416!3d14.123456!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x123456789abcdef!2sSample+Location!5e0!3m2!1sen!2sph!4v123456789"
        width="600"
        height="250"
        style="border:0;"
        allowfullscreen
        loading="lazy">
    </iframe>

</body>
</html>
